services:
  db:
    image: postgres:16
    container_name: atlas-db
    environment:
      POSTGRES_DB: atlas_finance
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas_finance"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: atlas-backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app"]
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: atlas-frontend
    environment:
      ATLAS_API_BASE_URL: http://backend:8000/api/v1
      STREAMLIT_SERVER_FILE_WATCHER_TYPE: poll
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8502:8501"
    volumes:
      - ./frontend:/app/frontend

volumes:
  postgres_data:
