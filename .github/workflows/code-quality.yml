name: Atlas Finance Code Quality

on:
  push:
  pull_request:

jobs:
  code-smell-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Pylint code smell scan
        run: |
          pylint backend/app \
            --disable=missing-module-docstring,missing-class-docstring,missing-function-docstring,too-few-public-methods \
            --fail-under=8.0

      - name: Mypy strict type check
        run: |
          cd backend
          python -m mypy app

      - name: Hook smoke test
        run: node .github/hooks/scripts/pre-safety.test.js

  frontend-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: TypeScript type check
        working-directory: frontend
        run: npm run typecheck

      - name: Test coverage
        working-directory: frontend
        run: npm run test:coverage