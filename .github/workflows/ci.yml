name: Atlas Finance CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-lint-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Lint
        run: |
          ruff check backend/app backend/tests

      - name: Run tests with coverage gate
        env:
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
          SECRET_KEY: "ci-secret-key"
          ENVIRONMENT: "test"
        run: |
          pytest backend/tests --cov=backend/app --cov-report=term-missing --cov-report=xml:backend/coverage.xml --cov-fail-under=92

      - name: Upload coverage to Codecov (CLI)
        shell: bash
        run: |
          curl -Os https://uploader.codecov.io/latest/linux/codecov
          chmod +x codecov
          ./codecov -f backend/coverage.xml -n atlas-finance-ci -Z || echo "Codecov upload skipped or failed; continuing without failing CI"

      - name: Build smoke check
        run: |
          python -m compileall backend/app

      - name: Alembic migrations smoke check
        env:
          DATABASE_URL: "sqlite+pysqlite:///./ci_alembic.db"
          SECRET_KEY: "ci-secret-key"
        run: |
          cd backend
          python -m alembic upgrade head
          python -m alembic downgrade -1
          python -m alembic upgrade head

  lint-and-build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build
